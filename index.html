<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vildoku</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>VILDOKU</h1>
            <div class="stats-bar">
                <span id="difficulty-display">Zor</span>
                <span id="timer">00:00</span>
                <button id="pause-btn">⏸</button>
            </div>
        </header>

        <div id="sudoku-board" class="board"></div>

        <div class="numpad" id="numpad">
            </div>

        <div class="controls">
            <button class="control-btn" id="delete">Sil</button>
            <button class="control-btn" id="new-game-btn">Yeni Oyun</button>
        </div>

        <div id="overlay" class="overlay hidden">
            <div class="modal">
                <h2 id="modal-title">Duraklatıldı</h2>
                <div class="difficulty-picker">
                    <button onclick="game.setDifficulty('easy')">Kolay</button>
                    <button onclick="game.setDifficulty('medium')">Orta</button>
                    <button onclick="game.setDifficulty('hard')">Zor</button>
                </div>
                <button id="resume-btn" class="main-btn">Devam Et</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
