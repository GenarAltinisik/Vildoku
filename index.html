<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vildoku</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body data-size="9">
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1 id="game-title">VILDOKU</h1>
                <button id="pause-btn" class="text-icon-btn">PAUSE</button>
            </div>
            <div class="stats-bar">
                <div class="stat-item"><span id="mode-display">CLASSIC</span> | <span id="diff-display">HARD</span></div>
                <div class="stat-item"><span id="timer">00:00</span></div>
                <div class="stat-item" id="lives-container">Mistakes: 0/3</div>
            </div>
        </header>

        <main class="board-container">
            <div id="sudoku-board" class="board"></div>
        </main>

        <section class="game-ui">
            <div class="numpad" id="numpad"></div>
            <div class="action-bar">
                <button class="action-btn delete" id="delete-btn">DELETE</button>
            </div>
        </section>

        <div id="overlay" class="overlay">
            <div class="modal">
                <h2 id="modal-title">PAUSED</h2>
                
                <div id="pause-view">
                    <button id="resume-btn" class="main-btn">RESUME</button>
                    <button id="show-new-game-btn" class="main-btn secondary mt-10">NEW GAME</button>
                </div>

                <div id="new-game-view" class="hidden">
                    <p class="menu-label">Select Game Mode:</p>
                    <div class="picker-group">
                        <button class="menu-btn" id="btn-classic">CLASSIC (9x9)</button>
                        <button class="menu-btn" id="btn-hex">HEX (16x16)</button>
                        <button class="menu-btn" id="btn-cage">CAGE (9x9)</button>
                        <button class="menu-btn" id="btn-cagehex">CAGE HEX (16x16)</button>
                    </div>
                    
                    <p class="menu-label">Select Difficulty:</p>
                    <div class="picker-group horizontal">
                        <button class="diff-btn" onclick="game.selectDifficulty('easy')">EASY</button>
                        <button class="diff-btn" onclick="game.selectDifficulty('medium')">MEDIUM</button>
                        <button class="diff-btn" onclick="game.selectDifficulty('hard')">HARD</button>
                    </div>
                    
                    <button id="start-new-btn" class="main-btn mt-20">START GAME</button>
                    <button id="cancel-new-btn" class="main-btn transparent mt-10">CANCEL</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
