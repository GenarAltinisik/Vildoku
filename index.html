<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vildoku</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>VILDOKU</h1>
            <div class="stats-bar">
                <div class="stat-item"><span id="difficulty-display">Zor</span></div>
                <div class="stat-item"><span id="timer">00:00</span></div>
                <div class="stat-item" id="lives-container">❤️❤️❤️</div>
                <button id="pause-btn" class="icon-btn">⏸</button>
            </div>
        </header>

        <main id="sudoku-board" class="board"></main>

        <section class="game-ui">
            <div class="numpad" id="numpad"></div>
            <div class="action-bar">
                <button class="action-btn delete" id="delete-btn">SİL</button>
                <button class="action-btn new-game" id="new-game-btn">YENİ OYUN</button>
            </div>
        </section>

        <div id="overlay" class="overlay">
            <div class="modal">
                <h2 id="modal-title">Vildoku</h2>
                <p id="modal-desc">Zorluk Seviyesi Seç:</p>
                <div class="difficulty-picker">
                    <button class="diff-btn" onclick="game.setDifficulty('easy')">KOLAY</button>
                    <button class="diff-btn" onclick="game.setDifficulty('medium')">ORTA</button>
                    <button class="diff-btn" onclick="game.setDifficulty('hard')">ZOR</button>
                </div>
                <button id="resume-btn" class="resume-btn hidden">DEVAM ET</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
