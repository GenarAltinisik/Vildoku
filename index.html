<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vildoku</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 id="game-title">VILDOKU</h1>
            <div class="stats-bar">
                <div class="stat-item"><span id="mode-display">9x9</span> | <span id="diff-display">HARD</span></div>
                <div class="stat-item"><span id="timer">00:00</span></div>
                <div class="stat-item" id="lives-container">Mistakes Left: 3/3</div>
                <button id="pause-btn" class="icon-btn">⏸</button>
            </div>
        </header>

        <main id="sudoku-board" class="board"></main>

        <section class="game-ui">
            <div class="numpad" id="numpad"></div>
            <div class="action-bar">
                <button class="action-btn delete" id="delete-btn">DELETE</button>
                <button class="action-btn new-game" id="new-game-btn">MODES</button>
            </div>
        </section>

        <div id="overlay" class="overlay">
            <div class="modal">
                <h2 id="modal-title">Vildoku</h2>
                <div id="menu-content">
                    <p class="menu-label">Select Game Mode:</p>
                    <div class="picker-group">
                        <button class="menu-btn" id="btn-classic">CLASSIC (9x9)</button>
                        <button class="menu-btn" id="btn-hex">HEXADECIMAL (16x16)</button>
                    </div>
                    
                    <p class="menu-label">Select Difficulty:</p>
                    <div class="picker-group horizontal">
                        <button class="diff-btn" onclick="game.selectDifficulty('easy')">EASY</button>
                        <button class="diff-btn" onclick="game.selectDifficulty('medium')">MEDIUM</button>
                        <button class="diff-btn" onclick="game.selectDifficulty('hard')">HARD</button>
                    </div>
                    
                    <button id="resume-btn" class="resume-btn hidden">RESUME</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
